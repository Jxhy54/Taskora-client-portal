{% extends 'core/base.html' %}

{% block content %}
<div class="form-wrapper">
    <div class="form-card">
        <h2 class="form-title">Login</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn btn-primary w-100 mt-2">Login</button>
        </form>

        <p class="mt-3 text-center">
            Don’t have an account?
            <a href="{% url 'register' %}">Register</a>
        </p>
    </div>
</div>
{% endblock %}
