{% load static %}

<!DOCTYPE html>
<html>

<head>
    <title>Taskora</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="app-body">

    <div class="app-layout">
        <aside class="sidebar">
            
                <div class="sidebar-header">
                    <h3 class="logo text-center"><i class="bi bi-clipboard-check"></i> Taskora</h3>
                </div>
                <hr id="break">
               
                <div class="sidebar-content">
                    <nav class="nav flex-column text-center">
                        <a class="sidebar-link" href="{% url 'home' %}"><i class="bi bi-house text-left"></i> Dashboard</a>
                        <a class="sidebar-link" href="{% url 'request_list' %}"><i class="bi bi-check"> My Requests</i></a>
                        <a class="sidebar-link" href="{% url 'create_request' %}"><i class="bi bi-plus"> Create Request</i></a>
                    </nav>
                </div>
            

            <div class="sidebar-bottom">

                {% if user.is_authenticated %}

                <p class="mb-2 text-white-50 text-center">Signed in as<br><strong class="text-white text-center">{{ user.username }}</strong>
                </p>

                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="btn btn-outline-light w-75 d-block mx-auto mb-1">Logout</button>
                </form>
                {% else %}
                <a class="btn btn-outline-light w-75 mb-2 d-block mx-auto" href="{% url 'login' %}">Login</a>
                <a class="btn btn-light w-75 d-block mx-auto mb-1" href="{% url 'register' %}">Register</a>
                {% endif %}

            </div>
        </aside>

        <div class="main-content">
            {% block content %}
            {% endblock %}
        </div>

    </div>

</body>

</html>
